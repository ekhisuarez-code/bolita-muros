<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Breakout: Teclado y Ratón</title>
<style>
body { background: #121212; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
canvas { background: #000; border: 3px solid #ff4444; border-radius: 8px; box-shadow: 0 0 20px rgba(255, 68, 68, 0.3); cursor: none; }
.info { text-align: center; margin-bottom: 10px; }
span { color: #00ffcc; font-weight: bold; font-size: 1.5em; }
#overlay {
position: absolute; top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0,0,0,0.9); display: none; flex-direction: column;
justify-content: center; align-items: center; z-index: 10;
}
button {
padding: 12px 25px; font-size: 1.2em; cursor: pointer;
background: #ff4444; color: white; border: none; border-radius: 5px; font-weight: bold;
transition: 0.3s;
}
button:hover { background: #ff2222; transform: scale(1.1); }
.keys { font-size: 0.8em; color: #888; margin-top: 10px; }
</style>
</head>
<body>

<div id="overlay">
<h1 style="color: #ff4444; font-size: 3em; margin-bottom: 0;">¡GAME OVER!</h1>
<p>Puntuación: <span id="final-score">0</span></p>
<button onclick="resetGame()">REINTENTAR</button>
</div>

<div class="info">
<h1>PUNTOS: <span id="score">0</span></h1>
<div class="keys">Mover: Flechas, WASD o Ratón</div>
</div>

<canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreElement = document.getElementById("score");
const overlay = document.getElementById("overlay");
const finalScoreElement = document.getElementById("final-score");

let score = 0;
let ballRadius = 8;
let x, y, dx, dy, paddleX;
let paddleWidth = 100;
const paddleHeight = 12;
let gameOver = false;

// Estados de las teclas
let rightPressed = false;
let leftPressed = false;

// Ladrillos
const rowCount = 5;
const columnCount = 7;
const brickWidth = 70;
const brickHeight = 20;
const brickPadding = 10;
const brickOffsetTop = 40;
const brickOffsetLeft = 25;
let bricks = [];

function initBricks() {
for(let c=0; c<columnCount; c++) {
bricks[c] = [];
for(let r=0; r<rowCount; r++) {
bricks[c][r] = { x: 0, y: 0, status: 1 };
}
}
}

// Escuchar teclado (WASD y Flechas)
document.addEventListener("keydown", (e) => {
if(e.key === "Right" || e.key === "ArrowRight" || e.key.toLowerCase() === "d") rightPressed = true;
else if(e.key === "Left" || e.key === "ArrowLeft" || e.key.toLowerCase() === "a") leftPressed = true;
});

document.addEventListener("keyup", (e) => {
if(e.key === "Right" || e.key === "ArrowRight" || e.key.toLowerCase() === "d") rightPressed = false;
else if(e.key === "Left" || e.key === "ArrowLeft" || e.key.toLowerCase() === "a") leftPressed = false;
});

// Escuchar ratón
document.addEventListener("mousemove", (e) => {
let relativeX = e.clientX - canvas.offsetLeft;
if(relativeX > 0 && relativeX < canvas.width) {
paddleX = relativeX - paddleWidth / 2;
}
});

function resetPositions() {
x = canvas.width / 2;
y = canvas.height - 30;
dx = 4;
dy = -4;
paddleX = (canvas.width - paddleWidth) / 2;
}

function resetGame() {
score = 0;
scoreElement.innerHTML = score;
gameOver = false;
overlay.style.display = "none";
initBricks();
resetPositions();
draw();
}

function collisionDetection() {
for(let c=0; c<columnCount; c++) {
for(let r=0; r<rowCount; r++) {
let b = bricks[c][r];
if(b.status === 1) {
if(x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
dy = -dy;
b.status = 0;
score += 10;
scoreElement.innerHTML = score;
}
}
}
}
}

function drawBall() {
ctx.beginPath();
ctx.arc(x, y, ballRadius, 0, Math.PI*2);
ctx.fillStyle = "#00ffcc";
ctx.fill();
ctx.closePath();
}

function drawPaddle() {
ctx.beginPath();
ctx.roundRect(paddleX, canvas.height - paddleHeight - 5, paddleWidth, paddleHeight, 5);
ctx.fillStyle = "#fff";
ctx.fill();
ctx.closePath();
}

function drawBricks() {
for(let c=0; c<columnCount; c++) {
for(let r=0; r<rowCount; r++) {
if(bricks[c][r].status === 1) {
let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
bricks[c][r].x = brickX;
bricks[c][r].y = brickY;
ctx.beginPath();
ctx.roundRect(brickX, brickY, brickWidth, brickHeight, 4);
ctx.fillStyle = `hsl(${c * 50}, 70%, 60%)`;
ctx.fill();
ctx.closePath();
}
}
}
}

function draw() {
if(gameOver) return;

ctx.clearRect(0, 0, canvas.width, canvas.height);
drawBricks();
drawBall();
drawPaddle();
collisionDetection();

// Movimiento por teclado
if(rightPressed && paddleX < canvas.width - paddleWidth) {
paddleX += 7;
} else if(leftPressed && paddleX > 0) {
paddleX -= 7;
}

// Rebotes paredes
if(x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
if(y + dy < ballRadius) dy = -dy;
// Suelo y Pala
else if(y + dy > canvas.height - ballRadius - 5) {
if(x > paddleX && x < paddleX + paddleWidth) {
// Cambiar ángulo según donde golpee la pala
let impact = x - (paddleX + paddleWidth / 2);
dx = impact * 0.15;
dy = -dy;
} else {
gameOver = true;
finalScoreElement.innerText = score;
overlay.style.display = "flex";
return;
}
}

x += dx;
y += dy;
requestAnimationFrame(draw);
}

resetGame();
</script>

</body>
</html>
